[theme]
primaryColor = "#2563eb"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#f8fafc"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false

[client]
# Удобнее на телефоне в WebView
toolbarMode = "minimal"
